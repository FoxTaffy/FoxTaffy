# ================================================
# FOXTAFFY.GAY — Полностью автономный стек
# PostgreSQL + MinIO + PostgREST + Upload API
# ================================================
# Запуск: docker compose up -d
# ================================================

services:

  # ── PostgreSQL 16 ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: foxtaffy-db
    restart: always
    shm_size: '128mb'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGRST_DB_PASS: ${PGRST_DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
        -c work_mem=4MB

  # ── MinIO (S3-compatible storage) ─────────────
  minio:
    image: minio/minio:latest
    container_name: foxtaffy-minio
    restart: always
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://foxtaffy.gay/minio
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO init: buckets + public policies ──────
  minio-init:
    image: minio/mc:latest
    container_name: foxtaffy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/convent &&
        mc mb --ignore-existing local/gallery &&
        mc anonymous set download local/convent &&
        mc anonymous set download local/gallery &&
        echo 'Buckets ready'
      "
    restart: "no"

  # ── PostgREST — REST API поверх PostgreSQL ─────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: foxtaffy-postgrest
    restart: always
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: "postgres://authenticator:${PGRST_DB_PASS}@db:5432/${POSTGRES_DB}"
      PGRST_DB_SCHEMAS: "public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: "${PGRST_JWT_SECRET}"
      PGRST_SERVER_PORT: "3000"
      PGRST_LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy

  # ── Upload API — загрузка файлов в MinIO ───────
  upload-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: foxtaffy-upload-api
    restart: always
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: "https://foxtaffy.gay/s3"
      UPLOAD_API_KEY: ${UPLOAD_API_KEY}
      ALLOWED_ORIGIN: "https://foxtaffy.gay"
    depends_on:
      minio:
        condition: service_healthy

volumes:
  postgres_data:
    name: foxtaffy_postgres_data
  minio_data:
    name: foxtaffy_minio_data

networks:
  default:
    name: foxtaffy_network
