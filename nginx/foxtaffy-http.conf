# ================================================
# FOXTAFFY.GAY — Nginx (HTTP-only, до SSL)
# Используется ТОЛЬКО на этапе первичного деплоя до получения сертификата.
# После certbot --nginx этот файл заменяется на foxtaffy.conf.
#
# Принцип: по HTTP НЕТ API. Только SPA + ACME-challenge.
# Все API-эндпоинты возвращают 503 до получения HTTPS.
# ================================================

server {
    listen 80;
    server_name foxtaffy.gay www.foxtaffy.gay;

    root /var/www/FoxTaffy/dist;
    index index.html;

    # ── ACME challenge (certbot) ───────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # ── API-эндпоинты недоступны по HTTP ──────────
    # Вернём 503, чтобы не отдавать данные без TLS
    location /rest/v1/ { return 503; }
    location /upload/   { return 503; }
    location /s3/       { return 503; }

    # ── MinIO Console только с localhost ──────────
    location /minio/ {
        allow 127.0.0.1;
        allow 193.23.197.34; # (для certbot, если нужно)
        deny  all;

        proxy_pass http://127.0.0.1:9101/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '<base href="/"/>' '<base href="/minio/">';
        sub_filter_once on;
        proxy_redirect / /minio/;
    }

    # ── Статические файлы ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Vue.js SPA (history mode) ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
