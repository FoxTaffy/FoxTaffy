# ================================================
# FOXTAFFY.GAY — Nginx Configuration
# Скопируй: sudo cp nginx/foxtaffy.conf /etc/nginx/sites-available/foxtaffy
# Включи:   sudo ln -s /etc/nginx/sites-available/foxtaffy /etc/nginx/sites-enabled/foxtaffy
# SSL:      sudo certbot --nginx -d foxtaffy.gay -d www.foxtaffy.gay
# ================================================

# ── Rate limiting zones (объявляются на уровне http{}, но задаём здесь) ──
# Для /upload/admin/login: 5 запросов/мин с одного IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# Для загрузки файлов: 20 запросов/мин с одного IP
limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/m;
# Для API в целом: 120 запросов/мин
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name foxtaffy.gay www.foxtaffy.gay;
    return 301 https://foxtaffy.gay$request_uri;
}

# www → apex redirect
server {
    listen 443 ssl;
    server_name www.foxtaffy.gay;

    ssl_certificate     /etc/letsencrypt/live/foxtaffy.gay/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxtaffy.gay/privkey.pem;

    return 301 https://foxtaffy.gay$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name foxtaffy.gay;

    ssl_certificate     /etc/letsencrypt/live/foxtaffy.gay/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxtaffy.gay/privkey.pem;

    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:FTSSL:10m;
    ssl_session_timeout 1d;

    # ── Security Headers (map — наследуются во все location блоки) ───
    # ВАЖНО: nginx НЕ наследует add_header из server{} в location{} если
    # в том location{} есть хотя бы один свой add_header. Поэтому все
    # security-заголовки повторяются явно в каждом proxy-блоке.
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://foxtaffy.gay; connect-src 'self' https://foxtaffy.gay https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com; media-src 'self' blob:; object-src 'none'; frame-src https://music.yandex.ru; frame-ancestors 'none';" always;

    # ── Vue.js SPA ─────────────────────────────────
    root /var/www/FoxTaffy/dist;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot|ico)$ {
        expires 1y;
        # Повторяем security headers (nginx не наследует из server{})
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── PostgREST DB API (/rest/v1/ → 3001) ───────
    location /rest/v1/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # Security headers (обязательно повторяем, т.к. не наследуются)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;

        add_header Access-Control-Allow-Origin "https://foxtaffy.gay" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Accept, apikey" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Upload API: login endpoint — жёсткий rate limit ─
    location = /upload/admin/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3002/upload/admin/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # ── Upload API (/upload/ → 3002) ──────────────
    # CORS и OPTIONS обрабатывает Express
    location /upload/ {
        limit_req zone=upload burst=10;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3002/upload/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        client_max_body_size 50m;
        proxy_read_timeout 120s;

        # Security headers (обязательно повторяем, т.к. не наследуются)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # ── MinIO публичные файлы (/s3/ → 9100) ───────
    # Content-Disposition: attachment запрещает браузеру исполнять
    # загружаемые файлы (SVG с JS, HTML) — защита от stored XSS
    # ^~ запрещает nginx проверять regex-локейшены для /s3/ путей
    location ^~ /s3/ {
        proxy_pass http://127.0.0.1:9100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_max_temp_file_size 0;

        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Access-Control-Allow-Origin "https://foxtaffy.gay" always;
        add_header Cache-Control "public, max-age=86400";

        # Для SVG/HTML форсируем скачивание вместо рендеринга в браузере
        location ~* \.(svg|html|htm|xml|js|json)$ {
            proxy_pass http://127.0.0.1:9100;
            add_header Content-Disposition "attachment" always;
            add_header X-Content-Type-Options nosniff always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        }
    }

    # ── MinIO Console (/minio/ → 9101) ────────────
    # Доступ только с localhost / доверенных IP
    location /minio/ {
        # Разрешаем только с localhost (настрой свой IP если нужно)
        allow 127.0.0.1;
        allow 193.23.197.34;
        deny all;

        proxy_pass http://127.0.0.1:9101/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '<base href="/"/>' '<base href="/minio/">';
        sub_filter_once on;
        proxy_redirect / /minio/;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
    }
}
